name: Build and deploy ASP.NET MVC app to Azure Web App - MediaDB

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: MediaDB
  SOLUTION_PATH: MediaDB.sln
  PROJECT_PATH: MediaDB\MediaDB.csproj
  BUILD_CONFIGURATION: Release
  PUBLISH_PATH: ${{ github.workspace }}\published

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up NuGet
        uses: nuget/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_PATH }}

      - name: Build and publish with MSBuild
        run: >
          msbuild "${{ env.PROJECT_PATH }}"
          /p:Configuration=${{ env.BUILD_CONFIGURATION }}
          /p:DeployOnBuild=true
          /p:WebPublishMethod=FileSystem
          /p:PublishUrl="${{ env.PUBLISH_PATH }}"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D8301D36EB8F4D43916BACAD63A01577 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_34CFF0638E754DDC88EE788DBD7C86CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2B2830ED9C314CB3AC615D8EBB0D749F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: ${{ env.PUBLISH_PATH }}
